<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Balloon Burst: คำประวิสรรชนีย์ Challenge - เกมการศึกษา AR Interactive" />
    <title>Balloon Burst: คำประวิสรรชนีย์ Challenge</title>
    <!-- MediaPipe CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js" crossorigin="anonymous">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous">
    </script>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f1f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Sarabun', 'Prompt', system-ui, -apple-system, sans-serif;
            touch-action: none;
            padding: 12px;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 820px;
            aspect-ratio: 4 / 3;
            background: #1a1a2e;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(255, 200, 0, 0.18), 0 20px 60px rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(255, 215, 0, 0.12);
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: #111;
            image-rendering: auto;
        }

        #video {
            display: none;
        }

        /* ===== UI OVERLAY ===== */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* ===== SCORE & TIMER ===== */
        #score-timer {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
            gap: 12px;
        }

        #score-timer span {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 40px;
            color: #fff;
            font-size: clamp(18px, 3.2vw, 26px);
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.10);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            letter-spacing: 0.3px;
        }

        #score-display {
            background: linear-gradient(135deg, #f7971e, #ffd200) !important;
            color: #1a1a2e !important;
            border: none !important;
            box-shadow: 0 4px 24px rgba(255, 200, 0, 0.25) !important;
        }

        #timer-display {
            background: rgba(0, 0, 0, 0.75) !important;
            color: #ffd700 !important;
            border-color: rgba(255, 215, 0, 0.25) !important;
        }

        /* ===== START / END SCREENS ===== */
        #start-screen,
        #end-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 30, 0.78);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            color: white;
            pointer-events: auto;
            padding: 28px 24px;
            text-align: center;
            z-index: 20;
            transition: opacity 0.35s ease;
        }

        #start-screen.hidden,
        #end-screen.hidden {
            display: none;
        }

        #start-screen h1 {
            font-size: clamp(36px, 8vw, 64px);
            background: linear-gradient(135deg, #f7971e, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
            text-shadow: 0 0 60px rgba(255, 200, 0, 0.15);
            line-height: 1.1;
        }

        #start-screen .sub-title {
            font-size: clamp(20px, 3.8vw, 32px);
            color: #ffd700;
            margin-bottom: 6px;
            font-weight: 600;
        }

        #start-screen .desc {
            font-size: clamp(15px, 2.2vw, 20px);
            color: #ccc;
            max-width: 480px;
            margin: 8px auto 26px;
            line-height: 1.7;
        }

        #start-screen .desc em {
            color: #ffd700;
            font-style: normal;
            font-weight: 700;
        }

        .btn {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border: none;
            color: #1a1a2e;
            font-size: clamp(22px, 3.6vw, 32px);
            font-weight: 700;
            padding: 16px 48px;
            border-radius: 60px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 8px 40px rgba(255, 200, 0, 0.30);
            transition: transform 0.15s, box-shadow 0.25s;
            font-family: inherit;
            letter-spacing: 0.5px;
            touch-action: manipulation;
        }

        .btn:hover {
            transform: scale(1.04);
            box-shadow: 0 12px 56px rgba(255, 200, 0, 0.50);
        }

        .btn:active {
            transform: scale(0.94);
        }

        /* ===== END SCREEN ===== */
        #end-screen .medal {
            font-size: clamp(64px, 12vw, 100px);
            margin: 4px 0 4px;
        }

        #end-screen .final-score {
            font-size: clamp(48px, 9vw, 76px);
            font-weight: 800;
            color: #ffd700;
            margin: 2px 0;
        }

        #end-screen .level {
            font-size: clamp(24px, 4vw, 38px);
            margin: 4px 0 16px;
            font-weight: 600;
        }

        #end-screen .btn {
            margin-top: 8px;
        }

        /* ===== TOAST ===== */
        #toast {
            position: absolute;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%) translateY(12px);
            background: rgba(0, 0, 0, 0.82);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #fff;
            padding: 12px 32px;
            border-radius: 40px;
            font-size: clamp(18px, 2.8vw, 24px);
            font-weight: 700;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.10);
            z-index: 30;
            white-space: nowrap;
            box-shadow: 0 8px 36px rgba(0, 0, 0, 0.6);
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            #game-container {
                border-radius: 18px;
            }

            #score-timer {
                top: 10px;
                left: 10px;
                right: 10px;
            }

            #score-timer span {
                padding: 5px 14px;
                font-size: clamp(14px, 3.5vw, 18px);
            }

            #start-screen .desc {
                max-width: 94%;
                font-size: clamp(14px, 2.6vw, 17px);
            }

            .btn {
                padding: 14px 32px;
                font-size: clamp(18px, 4vw, 24px);
            }

            #toast {
                padding: 10px 20px;
                font-size: clamp(15px, 3vw, 19px);
                bottom: 24px;
            }
        }

        @media (max-width: 400px) {
            #start-screen h1 {
                font-size: clamp(28px, 9vw, 36px);
            }
            #start-screen .sub-title {
                font-size: clamp(16px, 4vw, 22px);
            }
            .btn {
                padding: 12px 24px;
                font-size: clamp(16px, 4.5vw, 20px);
            }
            #end-screen .medal {
                font-size: clamp(48px, 15vw, 64px);
            }
            #end-screen .final-score {
                font-size: clamp(36px, 12vw, 48px);
            }
            #end-screen .level {
                font-size: clamp(18px, 5vw, 26px);
            }
        }

        /* ===== UTILITY ===== */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- กล้องซ่อน -->
        <video id="video" playsinline></video>

        <!-- Canvas หลักสำหรับ render -->
        <canvas id="canvas"></canvas>

        <!-- UI Overlay -->
        <div id="ui-overlay">
            <!-- คะแนน / เวลา -->
            <div id="score-timer">
                <span id="score-display">🏆 0</span>
                <span id="timer-display">⏱️ 60</span>
            </div>

            <!-- หน้าจอเริ่ม -->
            <div id="start-screen">
                <h1>🎈 Balloon Burst</h1>
                <div class="sub-title">คำประวิสรรชนีย์ Challenge</div>
                <div class="desc">
                    ใช้กล้องจับนิ้วชี้ เจาะเฉพาะลูกโป่งที่มี <em>คำประวิสรรชนีย์ ( ะ )</em>
                    <br />⏱️ 60 วินาที &nbsp;|&nbsp; ✅ +10 &nbsp;|&nbsp; ❌ -5
                </div>
                <button class="btn" id="start-btn">เริ่มเกม</button>
            </div>

            <!-- หน้าจอจบ -->
            <div id="end-screen" style="display:none;">
                <div class="medal" id="medal-icon">🥇</div>
                <div class="final-score" id="final-score">0</div>
                <div class="level" id="level-text">ระดับ: Gold</div>
                <button class="btn" id="restart-btn">เล่นอีกครั้ง</button>
            </div>

            <!-- Toast -->
            <div id="toast"></div>
        </div>
    </div>

    <script>
        // ================================================================
        //  DOM References
        // ================================================================
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const scoreDisplay = document.getElementById('score-display');
        const timerDisplay = document.getElementById('timer-display');
        const startScreen = document.getElementById('start-screen');
        const endScreen = document.getElementById('end-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const finalScoreEl = document.getElementById('final-score');
        const levelTextEl = document.getElementById('level-text');
        const medalIconEl = document.getElementById('medal-icon');
        const toast = document.getElementById('toast');

        // ================================================================
        //  Canvas size fixed (MediaPipe 640x480)
        // ================================================================
        canvas.width = 640;
        canvas.height = 480;

        // ================================================================
        //  Game State
        // ================================================================
        let landmarks = null;
        let gameState = 'idle'; // idle | playing | ended
        let score = 0;
        let timeLeft = 60;
        let balloons = [];
        let particles = [];
        let balloonInterval = null;
        let timerInterval = null;
        let animFrame = null;
        let toastTimeout = null;

        // ================================================================
        //  Word Lists (คำประวิสรรชนีย์ และคำอื่นๆ)
        // ================================================================
        const correctWords = [
            'มะม่วง', 'มะพร้าว', 'มะละกอ', 'มะเขือ', 'มะนาว',
            'กะทิ', 'กะปิ', 'กะละมัง', 'ตะกร้า', 'ตะวัน',
            'สะพาน', 'สะอาด', 'สะดวก', 'สะกด', 'ชะนี',
            'ชะอม', 'ทะเล', 'ทะนุถนอม', 'พระอาทิตย์', 'ระฆัง'
        ];

        const wrongWords = [
            'ตลาด', 'ขนม', 'ถนน', 'สบาย', 'สมัคร',
            'สมุด', 'ผลิต', 'ขยาย', 'ฉลาด', 'แสดง'
        ];

        const allWords = [...correctWords, ...wrongWords];

        // ================================================================
        //  Balloon Colors
        // ================================================================
        const balloonColors = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8',
            '#F7DC6F', '#BB8FCE', '#F1948A', '#82E0AA', '#85C1E9',
            '#F8C291', '#F6B93B', '#6A89CC', '#B8A9C9', '#F5B7B1',
            '#FF9FF3', '#54A0FF', '#5F27CD', '#FF9F43', '#00D2D3'
        ];

        // ================================================================
        //  Audio (Web Audio API)
        // ================================================================
        let audioCtx = null;

        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        function playPopSound() {
            try {
                const ctx = getAudioContext();
                // Oscillator
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.setValueAtTime(900, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.25, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.1);
                // Noise burst
                const bufSize = ctx.sampleRate * 0.04;
                const buffer = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * 0.25;
                }
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                const gn = ctx.createGain();
                gn.gain.setValueAtTime(0.2, ctx.currentTime);
                gn.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.04);
                noise.connect(gn);
                gn.connect(ctx.destination);
                noise.start(ctx.currentTime);
                noise.stop(ctx.currentTime + 0.04);
            } catch (_) { /* ignore */ }
        }

        function playWrongSound() {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.2);
            } catch (_) { /* ignore */ }
        }

        // ================================================================
        //  Toast
        // ================================================================
        function showToast(msg, color = '#ffffff') {
            toast.textContent = msg;
            toast.style.color = color;
            toast.style.borderColor = color;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 1000);
        }

        // ================================================================
        //  Particles
        // ================================================================
        function createParticles(x, y, color, count = 28) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 6;
                const size = 3 + Math.random() * 7;
                particles.push({
                    x,
                    y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 1.2,
                    size,
                    life: 1,
                    decay: 0.008 + Math.random() * 0.025,
                    color: color || `hsl(${Math.random() * 60 + 20}, 100%, 60%)`,
                    gravity: 0.06
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity;
                p.life -= p.decay;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function drawParticles() {
            for (const p of particles) {
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 18;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            ctx.globalAlpha = 1;
        }

        // ================================================================
        //  Balloon
        // ================================================================
        function darkenColor(color, amount) {
            let r, g, b;
            if (color.startsWith('#')) {
                const hex = color.slice(1);
                if (hex.length === 3) {
                    r = parseInt(hex[0] + hex[0], 16);
                    g = parseInt(hex[1] + hex[1], 16);
                    b = parseInt(hex[2] + hex[2], 16);
                } else {
                    r = parseInt(hex.slice(0, 2), 16);
                    g = parseInt(hex.slice(2, 4), 16);
                    b = parseInt(hex.slice(4, 6), 16);
                }
            } else {
                return color;
            }
            r = Math.floor(r * (1 - amount));
            g = Math.floor(g * (1 - amount));
            b = Math.floor(b * (1 - amount));
            return `rgb(${r},${g},${b})`;
        }

        function createBalloon() {
            if (balloons.length >= 16) return;
            const word = allWords[Math.floor(Math.random() * allWords.length)];
            const isCorrect = correctWords.includes(word);
            const x = 50 + Math.random() * (canvas.width - 100);
            const y = canvas.height + 20 + Math.random() * 30;
            const radius = 30 + Math.random() * 12;
            const speedY = -1.0 - Math.random() * 0.9;
            const speedX = (Math.random() - 0.5) * 0.6;
            const color = balloonColors[Math.floor(Math.random() * balloonColors.length)];
            balloons.push({
                x,
                y,
                vx: speedX,
                vy: speedY,
                radius,
                text: word,
                isCorrect,
                color,
                alive: true,
                popped: false,
                stringLen: 18 + Math.random() * 22
            });
        }

        function drawBalloon(b) {
            if (!b.alive) return;
            const { x, y, radius, text, color, stringLen } = b;

            // เชือก
            ctx.beginPath();
            ctx.moveTo(x, y + radius);
            ctx.quadraticCurveTo(x + 6, y + radius + stringLen * 0.5, x - 4, y + radius + stringLen);
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 2;
            ctx.stroke();

            // ตัวลูกโป่ง
            const grad = ctx.createRadialGradient(x - radius * 0.3, y - radius * 0.3, 4, x, y, radius);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(0.25, color);
            grad.addColorStop(1, darkenColor(color, 0.35));
            ctx.beginPath();
            ctx.ellipse(x, y, radius, radius * 1.1, 0, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // ไฮไลท์
            ctx.beginPath();
            ctx.ellipse(x - radius * 0.25, y - radius * 0.3, radius * 0.2, radius * 0.15, -0.4, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fill();

            // ข้อความ
            ctx.fillStyle = '#1a1a2e';
            ctx.font = `bold ${radius * 0.7}px 'Sarabun','Prompt',sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(255,255,255,0.6)';
            ctx.shadowBlur = 8;
            ctx.fillText(text, x, y + 2);
            ctx.shadowBlur = 0;
        }

        function updateBalloons() {
            for (let i = balloons.length - 1; i >= 0; i--) {
                const b = balloons[i];
                if (!b.alive) {
                    balloons.splice(i, 1);
                    continue;
                }
                b.x += b.vx;
                b.y += b.vy;
                if (b.y + b.radius < -30) {
                    balloons.splice(i, 1);
                }
            }
        }

        // ================================================================
        //  Pop Balloon
        // ================================================================
        function popBalloon(b) {
            if (!b.alive || b.popped) return;
            b.alive = false;
            b.popped = true;
            if (b.isCorrect) {
                score += 10;
                showToast('✅ ถูกต้อง! +10', '#4CAF50');
                createParticles(b.x, b.y, '#FFD700', 30);
                playPopSound();
            } else {
                score -= 5;
                showToast('❌ ผิด! -5', '#FF5252');
                createParticles(b.x, b.y, '#FF1744', 22);
                playWrongSound();
            }
            updateScoreUI();
        }

        // ================================================================
        //  UI Updates
        // ================================================================
        function updateScoreUI() {
            scoreDisplay.textContent = `🏆 ${score}`;
        }

        function updateTimerUI() {
            timerDisplay.textContent = `⏱️ ${timeLeft}`;
        }

        // ================================================================
        //  Draw Hand (นิ้วชี้ + เอฟเฟกต์เรืองแสง) แบบ Mirror
        // ================================================================
        function drawHand(landmarks) {
            if (!landmarks) return;
            const idx = landmarks[8];
            if (!idx) return;

            // 🔄 Mirror ภาพ: สะท้อนแกน X (เหมือนมองกระจก)
            const mirrorX = 1 - idx.x;
            const x = mirrorX * canvas.width;
            const y = idx.y * canvas.height;

            // Glow
            const grad = ctx.createRadialGradient(x, y, 4, x, y, 36);
            grad.addColorStop(0, 'rgba(255, 215, 0, 0.85)');
            grad.addColorStop(0.5, 'rgba(255, 215, 0, 0.30)');
            grad.addColorStop(1, 'rgba(255, 215, 0, 0)');
            ctx.beginPath();
            ctx.arc(x, y, 36, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // วงแหวน
            ctx.beginPath();
            ctx.arc(x, y, 16, 0, Math.PI * 2);
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 3;
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 28;
            ctx.stroke();
            ctx.shadowBlur = 0;

            // จุดกลาง
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#FFD700';
            ctx.fill();

            // กากบาท
            ctx.strokeStyle = 'rgba(255,215,0,0.35)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(x - 22, y);
            ctx.lineTo(x + 22, y);
            ctx.moveTo(x, y - 22);
            ctx.lineTo(x, y + 22);
            ctx.stroke();
        }

        // ================================================================
        //  Game Loop
        // ================================================================
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 🔄 วาดวิดีโอพื้นหลังแบบ Mirror (สะท้อนกระจก)
            if (video.readyState >= 2) {
                ctx.save();
                // สะท้อนแกน X
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ctx.restore();
            } else {
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // ลูกโป่ง
            for (const b of balloons) {
                drawBalloon(b);
            }

            // อนุภาค
            updateParticles();
            drawParticles();

            // มือ (แบบ Mirror แล้ว)
            if (landmarks) {
                drawHand(landmarks);
            }

            // อัปเดตลูกโป่ง
            updateBalloons();

            // ============================================================
            //  ตรวจจับการชน (ใช้พิกัด Mirror)
            // ============================================================
            if (gameState === 'playing' && landmarks && landmarks.length > 0) {
                const tip = landmarks[8];
                if (tip) {
                    // Mirror พิกัด X เช่นเดียวกับที่ใช้ใน drawHand
                    const mirrorX = 1 - tip.x;
                    const ix = mirrorX * canvas.width;
                    const iy = tip.y * canvas.height;

                    for (const b of balloons) {
                        if (!b.alive) continue;
                        const dx = ix - b.x;
                        const dy = iy - b.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < b.radius + 16) {
                            popBalloon(b);
                            break; // หนึ่งครั้งต่อเฟรม
                        }
                    }
                }
            }

            animFrame = requestAnimationFrame(gameLoop);
        }

        // ================================================================
        //  Start / End / Reset
        // ================================================================
        function startGame() {
            if (gameState === 'playing') return;

            // รีเซ็ต
            score = 0;
            timeLeft = 60;
            balloons = [];
            particles = [];
            updateScoreUI();
            updateTimerUI();

            gameState = 'playing';
            startScreen.classList.add('hidden');
            endScreen.style.display = 'none';

            // Resume audio context
            if (!audioCtx) {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            // Timer
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // Spawn balloons
            if (balloonInterval) clearInterval(balloonInterval);
            balloonInterval = setInterval(() => {
                if (gameState === 'playing') {
                    createBalloon();
                }
            }, 1100);

            // เริ่มต้นด้วยลูกโป่ง 3 ลูก
            for (let i = 0; i < 3; i++) {
                setTimeout(() => createBalloon(), i * 350);
            }
        }

        function endGame() {
            gameState = 'ended';
            if (timerInterval) clearInterval(timerInterval);
            if (balloonInterval) clearInterval(balloonInterval);

            balloons = [];
            particles = [];

            finalScoreEl.textContent = score;
            let level, medal;
            if (score >= 50) {
                level = 'Gold 🥇';
                medal = '🥇';
            } else if (score >= 20) {
                level = 'Silver 🥈';
                medal = '🥈';
            } else {
                level = 'Bronze 🥉';
                medal = '🥉';
            }
            levelTextEl.textContent = `ระดับ: ${level}`;
            medalIconEl.textContent = medal;
            endScreen.style.display = 'flex';
        }

        function resetGame() {
            gameState = 'idle';
            if (timerInterval) clearInterval(timerInterval);
            if (balloonInterval) clearInterval(balloonInterval);
            score = 0;
            timeLeft = 60;
            balloons = [];
            particles = [];
            updateScoreUI();
            updateTimerUI();
            startScreen.classList.remove('hidden');
            endScreen.style.display = 'none';
        }

        // ================================================================
        //  MediaPipe Setup
        // ================================================================
        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                landmarks = results.multiHandLandmarks[0];
            } else {
                landmarks = null;
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
        });
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        hands.onResults(onResults);

        const camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({ image: video });
            },
            width: 640,
            height: 480
        });
        camera.start().catch(err => {
            console.error('Camera error:', err);
            alert('⚠️ ไม่สามารถเปิดกล้องได้ กรุณาอนุญาตการใช้งานกล้อง และรีเฟรชหน้า');
        });

        // ================================================================
        //  Event Listeners
        // ================================================================
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', resetGame);

        // กด Space เพื่อเริ่ม
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' && gameState === 'idle') {
                e.preventDefault();
                startGame();
            }
        });

        // ป้องกัน context menu
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());

        // ================================================================
        //  Start Game Loop
        // ================================================================
        gameLoop();

        console.log('🎈 Balloon Burst: คำประวิสรรชนีย์ Challenge (Mirror Mode)');
        console.log('🔄 ภาพกล้องเป็นแบบสะท้อนกระจก เหมือนมองตัวเองในกระจก');
    </script>

</body>
</html>
